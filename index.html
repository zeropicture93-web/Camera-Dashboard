<style>

    color-scheme: light;
    --bg: #f7f7f5;
    --card: #ffffff;
    --ink: #1a1a19;
    --sub: #6b6b68;
    --line: #e8e6e1;
    --accent: #c96442;
    --accent-soft: #f3e3dc;
    --accent2: #6a9c78;
    --accent3: #5b8ab0;
    --accent4: #b08bc4;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
    padding: 24px;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .header h1 {
    font-size: 22px;
    margin: 0 0 4px 0;
    font-weight: 700;
  }
  .header p {
    margin: 0;
    color: var(--sub);
    font-size: 13px;
  }
  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 20px;
  }
  .tab-btn {
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink);
    padding: 7px 14px;
    border-radius: 999px;
    font-size: 13px;
    cursor: pointer;
    font-weight: 500;
  }
  .tab-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }
  .kpi-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px 16px;
  }
  .kpi-card .label {
    font-size: 12px;
    color: var(--sub);
    margin-bottom: 6px;
  }
  .kpi-card .value {
    font-size: 24px;
    font-weight: 700;
    color: var(--accent);
  }
  .kpi-card .sub {
    font-size: 11px;
    color: var(--sub);
    margin-top: 2px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
    gap: 14px;
    margin-bottom: 20px;
  }
  .grid.wide { grid-template-columns: 1fr; }
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 16px;
  }
  .card h3 {
    font-size: 14px;
    margin: 0 0 12px 0;
    font-weight: 600;
    color: var(--ink);
  }
  .chart-wrap {
    position: relative;
    height: 260px;
  }
  .chart-wrap.tall { height: 340px; }
  .chart-wrap.short { height: 200px; }
  table.gridjs-table { font-size: 12px; }
  .section-title {
    font-size: 15px;
    font-weight: 700;
    margin: 28px 0 12px 0;
    color: var(--ink);
  }
  #tableCard { margin-top: 4px; }
  .gridjs-wrapper { border-radius: 12px !important; border-color: var(--line) !important; }
  .gridjs-th { background: #faf9f7 !important; font-size: 12px !important; }
  .gridjs-search-input { border-radius: 8px !important; }
</style>
</head>

const PALETTE = ['#c96442','#6a9c78','#5b8ab0','#b08bc4','#d4a94c','#7a7a76','#e0836b','#8fb99a','#83a9c9','#c4a4d4','#e0c576','#9c9c98'];

let charts = {};
let currentScope = 'overall';

function destroyCharts() {
  Object.values(charts).forEach(c => c.destroy());
  charts = {};
}

function topN(obj, n) {
  return Object.entries(obj).slice(0, n);
}

function barChart(id, entries, horizontal, color) {
  const ctx = document.getElementById(id).getContext('2d');
  const labels = entries.map(e => e[0]);
  const values = entries.map(e => e[1]);
  charts[id] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: values,
        backgroundColor: color || PALETTE[0],
        borderRadius: 4,
        maxBarThickness: 28
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      indexAxis: horizontal ? 'y' : 'x',
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { display: !horizontal, color: '#eee' }, ticks: { font: { size: 11 } } },
        y: { grid: { display: horizontal, color: '#eee' }, ticks: { font: { size: 11 } } }
      }
    }
  });
}

function doughnutChart(id, entries) {
  const ctx = document.getElementById(id).getContext('2d');
  const labels = entries.map(e => e[0]);
  const values = entries.map(e => e[1]);
  charts[id] = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{ data: values, backgroundColor: PALETTE, borderWidth: 2, borderColor: '#fff' }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { position: 'right', labels: { font: { size: 11 }, boxWidth: 12 } } }
    }
  });
}

function renderKpis(scope) {
  const proposalRate = scope.total ? Math.round(scope.proposalCount / scope.total * 100) : 0;
  const kpis = [
    { label: '총 방송 건수', value: scope.total, sub: '' },
    { label: '선제안', value: scope.proposalCount, sub: proposalRate + '% 비중' },
    { label: '미니 프로젝트', value: scope.miniProjectCount, sub: '' },
    { label: '추가카메라 지원', value: scope.extraCamCount, sub: '' },
    { label: '조별 프로젝트 건수', value: Object.values(scope.teamProject).reduce((a,b)=>a+b,0), sub: '' },
    { label: '브랜드PGM 연계', value: Object.values(scope.brandPGM).reduce((a,b)=>a+b,0), sub: '' }
  ];
  document.getElementById('kpiRow').innerHTML = kpis.map(k =>
    `<div class="kpi-card"><div class="label">${k.label}</div><div class="value">${k.value}</div><div class="sub">${k.sub}</div></div>`
  ).join('');
}

let gridInstance = null;
function renderTable(records) {
  document.getElementById('dataTable').innerHTML = '';
  gridInstance = new gridjs.Grid({
    columns: ['날짜','방송 상품','조','담당자','상품군','장비','선제안','조별 프로젝트','브랜드PGM'],
    data: records.map(r => [
      r.date, r.title, r.team.join(', '), r.assignee.join(', '), r.category,
      r.equipment.join(', '), r.proposal ? 'O' : '', r.teamProject, r.brandPGM
    ]),
    search: true,
    sort: true,
    pagination: { limit: 12 },
    style: { table: { fontSize: '12px' } }
  }).render(document.getElementById('dataTable'));
}

function renderScope(key) {
  currentScope = key;
  destroyCharts();
  const scope = key === 'overall' ? DATA.overall : DATA.monthly[key];
  renderKpis(scope);
  barChart('chartCategory', Object.entries(scope.category), false, '#c96442');
  barChart('chartEquipment', Object.entries(scope.equipment), true, '#5b8ab0');
  barChart('chartTeam', Object.entries(scope.team), false, '#6a9c78');
  doughnutChart('chartSpecialShoot', Object.entries(scope.specialShoot));
  barChart('chartAssignee', topN(scope.assignee, 15), true, '#b08bc4');
  barChart('chartTeamProject', Object.entries(scope.teamProject), true, '#d4a94c');
  barChart('chartBrandPGM', Object.entries(scope.brandPGM), false, '#e0836b');

  document.getElementById('monthlyTrendWrap').style.display = key === 'overall' ? '' : 'none';
  if (key === 'overall') {
    const entries = DATA.months.map(m => [m, DATA.monthly[m].total]);
    barChart('chartMonthlyTrend', entries, false, '#c96442');
  }

  const records = key === 'overall' ? DATA.records : DATA.records.filter(r => {
    const [y,m] = r.date.split('/');
    return (y + '-' + m) === key;
  });
  renderTable(records);

  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.key === key);
  });
}

function buildTabs() {
  const tabs = [{ key: 'overall', label: '전체' }].concat(
    DATA.months.map(m => ({ key: m, label: m.slice(5) + '월' }))
  );
  document.getElementById('tabs').innerHTML = tabs.map(t =>
    `<button class="tab-btn" data-key="${t.key}">${t.label}</button>`
  ).join('');
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.addEventListener('click', () => renderScope(b.dataset.key));
  });
}

document.getElementById('subtitle').textContent =
  `Notion DB 스냅샷 · 총 ${DATA.totalRecords}건 (${DATA.months[0]} ~ ${DATA.months[DATA.months.length-1]})`;

buildTabs();
renderScope('overall');
</script>
